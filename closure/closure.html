<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closure</title>
    <script src="closure.js"></script>
</head>
<h1>CLOSURE</h1>
<body>
 
   
<p>Contagem com variável local</p>
<p id="demo"></p>
<button type="button" onclick="minhaFunc()">Conte!</button>
 
<script>
                function meuContador(){
                    let contador = 0;
                    return () => {
                        contador++
                        return contador;
                    }
                }
 
                const adicionar = meuContador();
 
                function minhaFunc(){
                    document.getElementById("demo").innerHTML = adicionar();
                }
           
            </script>    
</body>
